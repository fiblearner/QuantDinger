# QuantDinger Remote Deployment — dev-os-eye-api2 (Singapore)
#
# Reuses existing postgres and redis containers in the new-api_default network.
# postgres: root/123456, db=quantdinger, container name=postgres
# redis:    no auth,     container name=redis
#
# Usage:
#   docker compose -f docker-compose.remote.yml up -d --build

services:
  backend:
    build:
      context: ./backend_api_python
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: python:3.12-slim-bookworm
        BUILD_REGION: global
    container_name: quantdinger-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/data
      - ./backend_api_python/.env:/app/.env
    environment:
      - PYTHON_API_HOST=0.0.0.0
      - PYTHON_API_PORT=5000
      - TZ=Asia/Shanghai
      - DATABASE_URL=postgresql://root:123456@postgres:5432/quantdinger
      - DB_TYPE=postgresql
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_ENABLED=true
      - DB_POOL_MIN=5
      - DB_POOL_MAX=20
      - DB_POOL_ACQUIRE_TIMEOUT=10
      - DB_POOL_HEALTH_CHECK=true
      - MARKET_EXECUTOR_WORKERS=6
      - PORTFOLIO_EXECUTOR_WORKERS=3
      - GUNICORN_WORKERS=1
      - GUNICORN_THREADS=8
      - ALLOW_LOCAL_DESKTOP_BROKERS=false
    networks:
      - new-api_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/brokermr810/quantdinger-frontend:latest
    pull_policy: always
    container_name: quantdinger-frontend
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - new-api_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  backend_logs:
    driver: local
  backend_data:
    driver: local

networks:
  new-api_default:
    external: true
